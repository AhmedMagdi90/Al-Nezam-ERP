<dialog id="jobDetailsModal" class="modal bg-transparent p-0 overflow-hidden outline-none" x-data="jobDetailsManager()">
    <!-- Backdrop Blur with Dream Gradient -->
    <div class="fixed inset-0 bg-slate-900/10 backdrop-blur-[60px] transition-opacity"></div>

    <div
        class="relative bg-white/30 backdrop-blur-[80px] w-[95vw] max-w-6xl h-[85vh] mx-auto mt-[7vh] rounded-[64px] shadow-[0_50px_100px_-20px_rgba(0,0,0,0.1)] border border-white/40 overflow-hidden flex flex-col animate-in zoom-in duration-500">

        <!-- Header Part from Mockup -->
        <div class="px-16 py-12 flex-shrink-0 relative overflow-hidden">
            <!-- Decorative Glow inside modal -->
            <div
                class="absolute top-0 right-0 w-[300px] h-[300px] bg-blue-400/10 rounded-full blur-[80px] -mr-20 -mt-20">
            </div>

            <div class="flex justify-between items-start mb-10">
                <h2 class="text-3xl font-black text-slate-800 tracking-tightest">Job Detail</h2>
                <form method="dialog">
                    <button
                        class="w-14 h-14 rounded-2xl bg-white/40 border border-white flex items-center justify-center text-slate-400 hover:text-slate-800 transition-all">
                        <i class="ph ph-x text-2xl"></i>
                    </button>
                </form>
            </div>

            <div class="space-y-2">
                <h3 class="text-4xl font-black text-slate-900 tracking-tightest" id="modalJobTitle"
                    x-text="'Work Order: ' + (currentWo.id ? '#WO-' + currentWo.id : 'Loading...')"></h3>
                <div class="flex items-center gap-4">
                    <p class="text-lg font-bold text-slate-500 tracking-tight opacity-80"
                        x-text="'Status: ' + currentWo.status_display"></p>
                    <span x-show="currentWo.assignment_type"
                        :class="currentWo.assignment_type === 'auto' ? 'bg-emerald-100 text-emerald-600 border-emerald-200' : 'bg-amber-100 text-amber-600 border-amber-200'"
                        class="px-3 py-1 rounded-full text-[10px] font-black uppercase tracking-widest border"
                        x-text="currentWo.assignment_type"></span>
                </div>
            </div>
        </div>

        <!-- Metric Cards Row -->
        <div class="px-16 grid grid-cols-3 gap-8 mb-12 flex-shrink-0">
            <div
                class="p-8 bg-blue-50/40 rounded-[32px] border-2 border-blue-400/30 shadow-xl shadow-blue-400/10 relative group transition-all hover:scale-[1.02]">
                <p class="text-[10px] font-black text-blue-600 uppercase tracking-widest mb-2 opacity-60">Current Stage:
                </p>
                <p class="text-3xl font-black text-slate-800 tracking-tightest"
                    x-text="currentWo.current_stage_name || 'N/A'"></p>
            </div>
            <div
                class="p-8 bg-white/40 rounded-[32px] border-2 border-white/60 shadow-xl shadow-slate-200/50 relative group transition-all hover:scale-[1.02]">
                <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2 opacity-60">Machine
                    Station:</p>
                <p class="text-3xl font-black text-slate-800 tracking-tightest"
                    x-text="currentWo.machine_name || 'Factory Pool'"></p>
            </div>
            <div
                class="p-8 bg-white/40 rounded-[32px] border-2 border-white/60 shadow-xl shadow-slate-200/50 relative group transition-all hover:scale-[1.02]">
                <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2 opacity-60">Assigned
                    Worker:</p>
                <p class="text-3xl font-black text-indigo-600 tracking-tightest"
                    x-text="currentWo.assigned_worker_name || 'No Deployment'"></p>
            </div>
        </div>

        <!-- Main Body: Split View -->
        <div class="flex-1 px-16 pb-12 overflow-hidden flex gap-12 min-h-0">

            <!-- Left Panel: Instructions -->
            <div class="flex-1 flex flex-col min-h-0">
                <div
                    class="bg-white/40 backdrop-blur-3xl rounded-[48px] border border-white/60 p-10 shadow-2xl shadow-slate-200/40 flex-1 overflow-y-auto custom-scrollbar">
                    <h4 class="text-sm font-black text-slate-900 uppercase tracking-[0.2em] mb-8">Production Protocols
                    </h4>
                    <div class="space-y-6 text-slate-600 font-medium leading-relaxed italic text-lg"
                        x-html="currentWo.instructions || '<p>Universal manufacturing procedures in effect.</p>'">
                    </div>
                </div>
            </div>

            <!-- Right Panel: Workers & Actions -->
            <div class="w-[450px] flex flex-col gap-8 min-h-0">

                <!-- Deployment Control Center -->
                <div
                    class="flex-1 bg-slate-900/10 backdrop-blur-3xl rounded-[48px] border border-white/40 p-8 flex flex-col min-h-0">
                    <div class="flex items-center justify-between mb-6">
                        <div class="flex flex-col">
                            <h4 class="text-[10px] font-black text-slate-800 uppercase tracking-[0.3em]">Deployment
                                Center</h4>
                            <p class="text-[8px] font-bold text-slate-400 uppercase tracking-widest mt-1">Certified
                                Personnel Only</p>
                        </div>
                        <div class="flex gap-2">
                            <button @click="autoAssign()"
                                class="w-10 h-10 rounded-xl bg-white/40 border border-white flex items-center justify-center text-slate-600 hover:text-indigo-600 transition-all shadow-sm"
                                title="Auto-Assign from Shift">
                                <i class="ph ph-magic-wand text-lg"></i>
                            </button>
                        </div>
                    </div>

                    <div class="flex-1 overflow-y-auto space-y-3 pr-2 custom-scrollbar">
                        <template x-for="worker in certifiedWorkers" :key="worker.id">
                            <div class="p-4 bg-white/60 rounded-3xl border border-white flex items-center justify-between group hover:bg-white transition-all duration-300"
                                :class="currentWo.assigned_worker === worker.id ? 'ring-2 ring-indigo-500/50 bg-white' : ''">
                                <div class="flex items-center gap-4">
                                    <div
                                        class="w-12 h-12 rounded-2xl overflow-hidden shadow-lg group-hover:rotate-3 transition-transform relative">
                                        <img :src="'https://ui-avatars.com/api/?name=' + worker.username + '&background=random'"
                                            class="w-full h-full object-cover">
                                        <div x-show="currentWo.assigned_worker === worker.id"
                                            class="absolute inset-0 bg-indigo-600/20 flex items-center justify-center">
                                            <i class="ph ph-check-circle text-white text-xl"></i>
                                        </div>
                                    </div>
                                    <div>
                                        <p class="text-xs font-black text-slate-800"
                                            x-text="worker.full_name || worker.username"></p>
                                        <div class="flex items-center gap-1">
                                            <span class="w-1 h-1 bg-emerald-500 rounded-full"></span>
                                            <p class="text-[8px] font-bold text-slate-400 uppercase">Certified</p>
                                        </div>
                                    </div>
                                </div>
                                <button @click="reassign(worker.id)" :disabled="currentWo.assigned_worker === worker.id"
                                    :class="currentWo.assigned_worker === worker.id ? 'opacity-0' : 'opacity-100'"
                                    class="px-5 py-2.5 bg-indigo-600 text-white rounded-xl text-[9px] font-black uppercase tracking-widest shadow-lg shadow-indigo-200 transform active:scale-90 transition-all disabled:pointer-events-none">Deploy</button>
                            </div>
                        </template>
                        <div x-show="certifiedWorkers.length === 0" class="py-10 text-center">
                            <i class="ph ph-user-minus text-slate-300 text-4xl mb-4 block"></i>
                            <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest">No certified
                                workers found</p>
                        </div>
                    </div>
                </div>

            </div>
        </div>

    </div>

    <script>
        function jobDetailsManager() {
            return {
                currentWo: {},
                certifiedWorkers: [],
                isLoading: false,

                async init() {
                    window.addEventListener('open-wo-modal', async (e) => {
                        this.isLoading = true;
                        await this.loadWoData(e.detail.id);
                        document.getElementById('jobDetailsModal').showModal();
                        this.isLoading = false;
                    });
                },

                async loadWoData(id) {
                    try {
                        const res = await fetch(`/manufacturing/api/v1/workorders/${id}/`);
                        this.currentWo = await res.json();

                        // Load certified workers for the machine
                        if (this.currentWo.machine) {
                            const certRes = await fetch(`/manufacturing/api/v1/certifications/certified-workers/${this.currentWo.machine}/`);
                            this.certifiedWorkers = await certRes.json();
                        } else {
                            this.certifiedWorkers = [];
                        }
                    } catch (e) { console.error(e); }
                },

                async reassign(workerId) {
                    try {
                        const res = await fetch(`/manufacturing/api/v1/workorders/${this.currentWo.id}/reassign_worker/`, {
                            method: 'POST',
                            headers: {
                                'Content-Type': 'application/json',
                                'X-CSRFToken': '{{ csrf_token }}'
                            },
                            body: JSON.stringify({ worker_id: workerId })
                        });

                        if (res.ok) {
                            const data = await res.json();
                            this.currentWo.assigned_worker = workerId;
                            this.currentWo.assigned_worker_name = data.assigned_worker;
                            this.currentWo.assignment_type = 'manual';

                            // Refresh timeline
                            if (window.initGanttChart) window.initGanttChart();
                        } else {
                            const error = await res.json();
                            alert("Deployment failed: " + (error.error || JSON.stringify(error)));
                        }
                    } catch (e) { console.error(e); }
                },

                async autoAssign() {
                    try {
                        const res = await fetch(`/manufacturing/api/v1/workorders/${this.currentWo.id}/auto_assign_worker/`, {
                            method: 'POST',
                            headers: {
                                'Content-Type': 'application/json',
                                'X-CSRFToken': '{{ csrf_token }}'
                            }
                        });

                        if (res.ok) {
                            const data = await res.json();
                            // Refresh WO data
                            await this.loadWoData(this.currentWo.id);
                            // Refresh timeline
                            if (window.initGanttChart) window.initGanttChart();
                        } else {
                            const error = await res.json();
                            alert("Auto-assignment failed: No shift deployment found for this window.");
                        }
                    } catch (e) { console.error(e); }
                }
            }
        }
    </script>
</dialog>
