<div id="toast-container" class="fixed bottom-5 right-5 z-50 flex flex-col gap-2 pointer-events-none">
    <!-- Toasts will be injected here -->
</div>

<template id="toast-template">
    <div class="toast transform transition-all duration-300 translate-x-full opacity-0 flex items-center w-full max-w-xs p-4 space-x-4 text-slate-500 bg-white divide-x divide-slate-200 rounded-lg shadow-lg dark:text-slate-400 dark:divide-slate-700 dark:bg-slate-800 pointer-events-auto"
        role="alert">
        <div class="toast-icon inline-flex items-center justify-center flex-shrink-0 w-8 h-8 rounded-lg">
            <!-- Icon SVG injected here -->
        </div>
        <div class="pl-4 text-sm font-bold toast-message">Message sent successfully.</div>
        <button type="button"
            class="ml-auto -mx-1.5 -my-1.5 bg-white text-slate-400 hover:text-slate-900 rounded-lg focus:ring-2 focus:ring-slate-300 p-1.5 hover:bg-slate-100 inline-flex h-8 w-8 dark:text-slate-500 dark:hover:text-white dark:bg-slate-800 dark:hover:bg-slate-700"
            aria-label="Close" onclick="this.closest('.toast').remove()">
            <span class="sr-only">Close</span>
            <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 20 20">
                <path fill-rule="evenodd"
                    d="M4.293 4.293a1 1 0 011.414 0L10 8.586l4.293-4.293a1 1 0 111.414 1.414L11.414 10l4.293 4.293a1 1 0 01-1.414 1.414L10 11.414l-4.293 4.293a1 1 0 01-1.414-1.414L8.586 10 4.293 5.707a1 1 0 010-1.414z"
                    clip-rule="evenodd"></path>
            </svg>
        </button>
    </div>
</template>

<script>
    const Toast = {
        show: function (message, type = 'success') {
            const container = document.getElementById('toast-container');
            const template = document.getElementById('toast-template');
            const clone = template.content.cloneNode(true);
            const toastEl = clone.querySelector('.toast');

            // Icon & Color Logic
            const iconEl = toastEl.querySelector('.toast-icon');
            let iconSvg = '';
            let colorClass = '';

            if (type === 'success') {
                colorClass = 'text-green-500 bg-green-100 dark:bg-green-800 dark:text-green-200';
                iconSvg = `<svg class="w-5 h-5" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M16.707 5.293a1 1 0 010 1.414l-8 8a1 1 0 01-1.414 0l-4-4a1 1 0 011.414-1.414L8 12.586l7.293-7.293a1 1 0 011.414 0z" clip-rule="evenodd"></path></svg>`;
            } else if (type === 'error') {
                colorClass = 'text-red-500 bg-red-100 dark:bg-red-800 dark:text-red-200';
                iconSvg = `<svg class="w-5 h-5" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M4.293 4.293a1 1 0 011.414 0L10 8.586l4.293-4.293a1 1 0 111.414 1.414L11.414 10l4.293 4.293a1 1 0 01-1.414 1.414L10 11.414l-4.293 4.293a1 1 0 01-1.414-1.414L8.586 10 4.293 5.707a1 1 0 010-1.414z" clip-rule="evenodd"></path></svg>`;
            } else {
                colorClass = 'text-blue-500 bg-blue-100 dark:bg-blue-800 dark:text-blue-200';
                iconSvg = `<svg class="w-5 h-5" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7-4a1 1 0 11-2 0 1 1 0 012 0zM9 9a1 1 0 000 2v3a1 1 0 001 1h1a1 1 0 100-2v-3a1 1 0 00-1-1H9z" clip-rule="evenodd"></path></svg>`;
            }

            iconEl.className += ` ${colorClass}`;
            iconEl.innerHTML = iconSvg;
            toastEl.querySelector('.toast-message').textContent = message;

            container.appendChild(toastEl);

            // Animate Entry
            requestAnimationFrame(() => {
                toastEl.classList.remove('translate-x-full', 'opacity-0');
            });

            // Auto Dismiss
            setTimeout(() => {
                toastEl.classList.add('translate-x-full', 'opacity-0');
                setTimeout(() => toastEl.remove(), 300);
            }, 3000);
        }
    };

    // Check for Django Messages
    document.addEventListener('DOMContentLoaded', () => {
        const messages = JSON.parse(document.getElementById('django-messages-json')?.textContent || '[]');
        messages.forEach(msg => Toast.show(msg.message, msg.tags));
    });
</script>
