<dialog id="shiftAssignmentModal_v2" class="modal bg-transparent p-0 overflow-hidden outline-none"
    x-data="shiftManager()">

    <!-- Backdrop Blur -->
    <div class="fixed inset-0 bg-slate-900/10 backdrop-blur-[60px] transition-opacity"></div>

    <div class="relative bg-white/30 backdrop-blur-[80px] mx-auto rounded-[64px] shadow-[0_50px_100px_-20px_rgba(0,0,0,0.1)] border border-white/40 overflow-hidden flex flex-col animate-in zoom-in duration-500 transition-all"
        :class="isFullScreen ? 'w-full h-full mt-0 rounded-none' : 'w-[95vw] max-w-6xl h-[85vh] mt-[5vh]'">

        <!-- Header -->
        <div class="px-8 py-6 flex-shrink-0 border-b border-white/20">
            <div class="flex justify-between items-center mb-6">
                <div class="flex items-center gap-4">
                    <div>
                        <h2 class="text-2xl font-black text-slate-800 tracking-tightest">Shift Assignments</h2>
                        <p class="text-xs font-bold text-slate-500 opacity-60">Deploy workers to machine stations</p>
                    </div>
                    <!-- Full Screen Toggle -->
                    <button @click="isFullScreen = !isFullScreen"
                        class="p-2 rounded-xl hover:bg-white/40 text-slate-400 hover:text-indigo-600 transition-all"
                        :title="isFullScreen ? 'Exit Full Screen' : 'Enter Full Screen'">
                        <i class="ph text-xl" :class="isFullScreen ? 'ph-arrows-in' : 'ph-arrows-out'"></i>
                    </button>
                </div>

                <div class="flex items-center gap-4">
                    <!-- Search Bar -->
                    <div class="relative group w-64">
                        <i
                            class="ph ph-magnifying-glass absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 group-focus-within:text-indigo-500 transition-colors"></i>
                        <input type="text" x-model="searchQuery" placeholder="Search machines..."
                            class="w-full bg-white/40 border border-white/60 rounded-xl py-2.5 pl-10 pr-4 text-xs font-bold text-slate-700 outline-none focus:bg-white focus:ring-2 focus:ring-indigo-500/20 transition-all placeholder-slate-400">
                    </div>

                    <form method="dialog">
                        <button
                            class="w-10 h-10 rounded-xl bg-white/40 border border-white flex items-center justify-center text-slate-400 hover:text-slate-800 transition-all">
                            <i class="ph ph-x text-lg"></i>
                        </button>
                    </form>
                </div>
            </div>

            <!-- Controls & Tabs -->
            <div class="flex flex-col gap-4">
                <!-- Top Row: Date & Shift -->
                <div class="flex items-center gap-4">
                    <div class="bg-white/40 rounded-xl px-4 py-2 border border-white/60 flex items-center gap-3">
                        <label class="text-[9px] font-black text-slate-400 uppercase tracking-widest">Date</label>
                        <input type="date" x-model="assignmentDate" @change="loadAssignments()"
                            class="bg-transparent border-none outline-none text-sm font-black text-slate-800 p-0 focus:ring-0">
                    </div>
                    <div class="h-8 w-px bg-white/20"></div>
                    <div class="flex bg-white/40 rounded-xl p-1 border border-white/60">
                        <template x-for="s in ['day', 'middle', 'night']">
                            <button @click="shiftType = s; loadAssignments()"
                                :class="shiftType === s ? 'bg-indigo-600 text-white shadow-md' : 'text-slate-400 hover:text-slate-600'"
                                class="px-4 py-1.5 rounded-lg text-[9px] font-black uppercase tracking-widest transition-all"
                                x-text="s">
                            </button>
                        </template>
                    </div>
                </div>

                <!-- Tabs -->
                <div class="flex gap-2 overflow-x-auto custom-scrollbar pb-1">
                    <button @click="activeTab = 'all'"
                        :class="activeTab === 'all' ? 'bg-slate-800 text-white shadow-lg' : 'bg-white/40 text-slate-500 hover:bg-white/60'"
                        class="px-5 py-2 rounded-full text-[10px] font-black uppercase tracking-widest transition-all whitespace-nowrap flex-shrink-0 border border-white/40">
                        All Machines
                    </button>
                    <template x-for="type in machineTypes" :key="type">
                        <button @click="activeTab = type"
                            :class="activeTab === type ? 'bg-slate-800 text-white shadow-lg' : 'bg-white/40 text-slate-500 hover:bg-white/60'"
                            class="px-5 py-2 rounded-full text-[10px] font-black uppercase tracking-widest transition-all whitespace-nowrap flex-shrink-0 border border-white/40"
                            x-text="type || 'Other'">
                        </button>
                    </template>
                </div>
            </div>
        </div>

        <!-- Machine List (Grid) -->
        <div class="flex-1 px-8 py-6 overflow-y-auto custom-scrollbar bg-slate-50/30">
            <!-- Loading State -->
            <div x-show="machines.length === 0"
                class="h-full flex flex-col items-center justify-center text-slate-400 opacity-60">
                <i class="ph ph-spinner animate-spin text-3xl mb-3"></i>
                <p class="text-[10px] font-bold uppercase tracking-widest">Loading Inventory...</p>
            </div>

            <!-- Empty Filter State -->
            <div x-show="machines.length > 0 && filteredMachines.length === 0"
                class="h-64 flex flex-col items-center justify-center text-slate-400 opacity-60">
                <i class="ph ph-magnifying-glass text-3xl mb-3"></i>
                <p class="text-[10px] font-bold uppercase tracking-widest">No machines found for this filter</p>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4"
                x-show="filteredMachines.length > 0">
                <template x-for="machine in filteredMachines" :key="machine.id">
                    <div
                        class="bg-white/60 backdrop-blur-sm p-4 rounded-[24px] border border-white hover:shadow-xl hover:shadow-indigo-500/5 hover:-translate-y-1 transition-all group duration-300">
                        <div class="flex items-start justify-between mb-4">
                            <div class="flex items-center gap-3">
                                <div
                                    class="w-10 h-10 rounded-xl bg-slate-100 flex items-center justify-center text-slate-400 group-hover:bg-indigo-600 group-hover:text-white transition-colors duration-300 shadow-sm">
                                    <i class="ph ph-factory text-lg"></i>
                                </div>
                                <div class="min-w-0">
                                    <h4 class="text-sm font-bold text-slate-800 truncate" x-text="machine.display_name || machine.name"></h4>
                                    <div class="flex items-center gap-2">
                                        <span class="text-[9px] font-bold text-slate-400 uppercase tracking-widest"
                                            x-text="machine.code + ' (#' + machine.id + ')'"></span>
                                        <span
                                            class="px-1.5 py-0.5 rounded-md bg-slate-200 text-slate-500 text-[8px] font-bold uppercase"
                                            x-text="machine.type || 'Other'"></span>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <div>
                            <select x-model="assignments[machine.id]"
                                :class="assignments[machine.id] ? 'bg-indigo-50 border-indigo-200 text-indigo-700' : 'bg-slate-50 border-slate-200 text-slate-500'"
                                class="w-full border rounded-xl py-2 px-3 text-[10px] font-bold outline-none focus:ring-2 focus:ring-indigo-500/20 transition-all appearance-none cursor-pointer">

                                <option value="">Not Assigned</option>

                                <!-- Loading State -->
                                <template x-if="!certifiedWorkersPool[machine.id]">
                                    <option disabled>Loading...</option>
                                </template>

                                <!-- Empty State -->
                                <template
                                    x-if="certifiedWorkersPool[machine.id] && certifiedWorkersPool[machine.id].length === 0">
                                    <option disabled>No certified workers</option>
                                </template>

                                <!-- Workers -->
                                <template x-for="worker in getCertifiedWorkers(machine.id)" :key="worker.id">
                                    <option :value="worker.id" x-text="worker.full_name || worker.username"></option>
                                </template>
                            </select>
                        </div>
                    </div>
                </template>
            </div>
        </div>

        <!-- Sticky Footer -->
        <div
            class="px-8 py-5 bg-white/80 backdrop-blur-xl border-t border-white/60 flex justify-between items-center z-10">
            <div class="flex items-center gap-3">
                <span class="flex h-2 w-2 relative">
                    <span
                        class="animate-ping absolute inline-flex h-full w-full rounded-full bg-emerald-400 opacity-75"></span>
                    <span class="relative inline-flex rounded-full h-2 w-2 bg-emerald-500"></span>
                </span>
                <p class="text-[9px] font-black text-slate-500 uppercase tracking-widest">
                    <span x-text="Object.keys(assignments).filter(k => assignments[k]).length"></span> Workers Deployed
                </p>
            </div>
            <button @click="saveAssignments()"
                class="px-8 py-3 bg-indigo-600 text-white rounded-xl text-[10px] font-black uppercase tracking-widest shadow-lg shadow-indigo-500/20 hover:bg-indigo-700 hover:scale-[1.02] active:scale-95 transition-all flex items-center gap-2">
                <i class="ph ph-check-circle text-base"></i>
                <span>Finalize Assignments</span>
            </button>
        </div>
    </div>

    <script>
        function shiftManager() {
            return {
                isFullScreen: false,
                machines: [],
                certifiedWorkersPool: {}, // machineId -> [workers]
                assignments: {}, // machineId -> workerId
                assignmentDate: new Date().toISOString().split('T')[0],
                shiftType: 'day',
                isLoading: false,
                searchQuery: '',
                activeTab: 'all',
                machineTypes: [],

                async init() {
                    console.log("Shift Manager UX Enhanced Initializing...");
                    await this.loadInitialData();
                },

                get filteredMachines() {
                    let filtered = this.machines;

                    // Filter by Tab (Type)
                    if (this.activeTab !== 'all') {
                        filtered = filtered.filter(m => (m.type || 'Other') === this.activeTab);
                    }

                    // Filter by Search
                    if (this.searchQuery) {
                        const q = this.searchQuery.toLowerCase();
                        filtered = filtered.filter(m =>
                            m.name.toLowerCase().includes(q) ||
                            m.code.toLowerCase().includes(q)
                        );
                    }

                    return filtered;
                },

                async loadInitialData() {
                    try {
                        // Load Machines
                        const mRes = await fetch('/manufacturing/api/v1/machines/');
                        const mData = await mRes.json();
                        this.machines = Array.isArray(mData) ? mData : (mData.results || []);

                        // Extract Unique Types for Tabs
                        const types = new Set(this.machines.map(m => m.type || null));
                        this.machineTypes = Array.from(types).map(t => t || 'Other').sort();

                        // Load Assignments for current selection
                        await this.loadAssignments();
                    } catch (e) {
                        console.error("Failed to load initial data", e);
                        if (typeof Toast !== 'undefined') Toast.show('Failed to load machines', 'error');
                    }
                },

                async loadAssignments() {
                    try {
                        const res = await fetch(`/manufacturing/api/v1/shift-assignments/?date=${this.assignmentDate}&shift=${this.shiftType}`);
                        const data = await res.json();

                        // Reset assignments
                        this.assignments = {};
                        data.forEach(asgn => {
                            this.assignments[asgn.machine] = asgn.worker;
                        });

                        // Fetch certified workers optimized
                        // Use Promise.all to fetch in parallel and update pool once
                        const fetchPromises = this.machines.map(async (machine) => {
                            if (!this.certifiedWorkersPool[machine.id]) {
                                try {
                                    const certRes = await fetch(`/manufacturing/api/v1/certifications/certified-workers/${machine.id}/`);
                                    if (certRes.ok) {
                                        const workers = await certRes.json();
                                        // Use Alpine's reactive assignment if needed, but direct assignment usually works in initialization
                                        this.certifiedWorkersPool[machine.id] = workers;
                                    }
                                } catch (e) {
                                    console.error(`Failed to fetch workers for machine ${machine.id}`, e);
                                    this.certifiedWorkersPool[machine.id] = [];
                                }
                            }
                        });

                        await Promise.all(fetchPromises);

                        // Force reactivity update by creating a new object reference
                        this.certifiedWorkersPool = JSON.parse(JSON.stringify(this.certifiedWorkersPool));
                        console.log("Certified Workers Pool Updated:", this.certifiedWorkersPool);

                    } catch (e) { console.error(e); }
                },

                getCertifiedWorkers(machineId) {
                    return this.certifiedWorkersPool[machineId] || [];
                },

                async saveAssignments() {
                    const payload = {
                        date: this.assignmentDate,
                        shift_type: this.shiftType,
                        assignments: this.machines.map(machine => {
                            const wId = this.assignments[machine.id];
                            return {
                                machine_id: machine.id,
                                worker_id: wId ? parseInt(wId) : null
                            };
                        })
                    };

                    try {
                        const res = await fetch('/manufacturing/api/v1/shift-assignments/bulk_assign/', {
                            method: 'POST',
                            headers: {
                                'Content-Type': 'application/json',
                                'X-CSRFToken': '{{ csrf_token }}'
                            },
                            body: JSON.stringify(payload)
                        });

                        if (res.ok) {
                            if (typeof Toast !== 'undefined') {
                                Toast.show('Assignments finalized successfully', 'success');
                            }
                            document.getElementById('shiftAssignmentModal_v2').close();
                            setTimeout(() => { window.location.reload(); }, 800);
                        } else {
                            const error = await res.json();
                            if (typeof Toast !== 'undefined') Toast.show('Save failed', 'error');
                            else alert("Failed to save");
                        }
                    } catch (e) {
                        console.error(e);
                        if (typeof Toast !== 'undefined') Toast.show('Network error', 'error');
                    }
                }
            }
        }
    </script>
</dialog>
