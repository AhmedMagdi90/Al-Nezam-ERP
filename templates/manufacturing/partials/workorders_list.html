{% load i18n tenant_i18n %}
<div class="w-full" x-data="plannerList()">
  <!-- Alpine Loop -->
  <template x-for="wo in filteredTasks" :key="wo.id">
    <div
      class="group relative mb-4 bg-white rounded-2xl p-5 border border-slate-100 shadow-sm hover:shadow-lg hover:translate-y-[-2px] hover:border-indigo-100 transition-all duration-300 cursor-grab active:cursor-grabbing"
      draggable="true" @dragstart="handleSidebarDragStart($event, wo.id, wo.product, wo.machine_id)">

      <!-- Status Indicator Strip -->
      <div class="absolute left-0 top-4 bottom-4 w-1.5 rounded-r-full" :class="{
                    'bg-emerald-500': wo.status === 'completed',
                    'bg-blue-500': wo.status === 'in_progress',
                    'bg-amber-400': wo.status === 'pending' || !wo.status
                }">
      </div>

      <div class="pl-4">
        <!-- Header: Product & Edit -->
        <div class="flex justify-between items-start mb-3 transition-all">
          <div>
            <h4
              class="font-semibold text-slate-800 text-base leading-tight group-hover:text-indigo-600 transition-colors"
              x-text="wo.product">
            </h4>
            <span class="text-xs text-slate-400 font-medium" x-text="'#' + wo.id"></span>
          </div>

          <div class="flex items-center gap-1.5">
            <button
              x-show="wo.next_stage_ready"
              class="px-2.5 py-1.5 rounded-lg text-[10px] font-bold uppercase tracking-wide bg-indigo-600 text-white hover:bg-indigo-700 transition-all"
              @click.stop="startNextStage(wo)"
              title="Start next stage">
              Start Stage 2
            </button>

            <button
              class="opacity-0 group-hover:opacity-100 p-2 text-slate-400 hover:text-indigo-600 hover:bg-slate-50 rounded-lg transition-all"
              @click="openEditDrawer(wo.id)" title="{% tenant_trans "Edit Order" %}">
              <i class="ph ph-pencil-simple"></i>
            </button>
          </div>
        </div>

        <!-- Metrics Row -->
        <div class="flex flex-wrap items-center gap-2.5 mb-4">
          <!-- Status Badge -->
          <span
            class="inline-flex items-center px-2.5 py-1 rounded-full text-[10px] font-bold uppercase tracking-wide border"
            :class="{
                            'bg-emerald-50 text-emerald-600 border-emerald-100': wo.status === 'completed',
                            'bg-blue-50 text-blue-600 border-blue-100': wo.status === 'in_progress',
                            'bg-amber-50 text-amber-600 border-amber-100': wo.status === 'pending' || !wo.status
                        }">
            <i class="ph mr-1" :class="{
                               'ph-check': wo.status === 'completed',
                               'ph-spinner animate-spin': wo.status === 'in_progress',
                               'ph-clock': wo.status === 'pending' || !wo.status
                           }"></i>
            <span x-text="formatStatus(wo.status)"></span>
          </span>

          <span
            x-show="wo.next_stage_ready"
            class="inline-flex items-center px-2.5 py-1 rounded-full text-[10px] font-bold uppercase tracking-wide border bg-indigo-50 text-indigo-700 border-indigo-100">
            <i class="ph ph-arrow-right mr-1"></i>
            Stage 2 Ready
          </span>

          <span
            x-show="wo.cycle_state"
            class="inline-flex items-center px-2.5 py-1 rounded-full text-[10px] font-bold border"
            :title="cycleBlockerReason(wo.cycle_state)"
            :class="wo.cycle_state && wo.cycle_state.blocked ? 'bg-rose-50 text-rose-700 border-rose-100' : 'bg-slate-50 text-slate-700 border-slate-100'">
            <i class="ph mr-1" :class="wo.cycle_state && wo.cycle_state.blocked ? 'ph-warning-circle' : 'ph-arrow-circle-right'"></i>
            <span x-text="formatCycleState(wo.cycle_state)"></span>
          </span>

          <!-- Qty Badge -->
          <span
            class="inline-flex items-center px-2.5 py-1 rounded-full text-[10px] font-bold bg-indigo-50 text-indigo-700 border border-indigo-100">
            {% tenant_trans "Qty" %}: <span x-text="wo.quantity"></span>
          </span>
        </div>

        <div
          x-show="cycleBlockerReason(wo.cycle_state)"
          class="-mt-2 mb-3 rounded-xl border border-rose-100 bg-rose-50 px-3 py-2 text-[11px] font-bold leading-snug text-rose-700">
          <i class="ph ph-warning-circle mr-1"></i>
          <span x-text="cycleBlockerReason(wo.cycle_state)"></span>
        </div>

        <!-- Footer: Machine & Time -->
        <div class="flex justify-between items-center pt-3 border-t border-slate-50">
          <div class="flex items-center gap-2" title="{% tenant_trans "Assigned Machine" %}">
            <template x-if="wo.machine_id">
              <div class="flex items-center gap-2">
                <div class="relative flex h-2.5 w-2.5">
                  <span
                    class="animate-ping absolute inline-flex h-full w-full rounded-full bg-emerald-400 opacity-75"></span>
                  <span class="relative inline-flex rounded-full h-2.5 w-2.5 bg-emerald-500"></span>
                </div>
                <span class="text-xs font-semibold text-slate-700" x-text="getMachineName(wo.machine_id)"></span>
              </div>
            </template>
            <template x-if="!wo.machine_id">
              <div class="flex items-center gap-2">
                <span class="h-2.5 w-2.5 rounded-full bg-slate-200"></span>
                <span class="text-xs text-slate-400 italic">{% tenant_trans "Unassigned" %}</span>
              </div>
            </template>
          </div>

          <template x-if="wo.start">
            <div
              class="flex items-center gap-1.5 text-[10px] font-medium text-slate-500 bg-slate-50 px-2.5 py-1 rounded-full border border-slate-100">
              <i class="ph ph-calendar-blank text-slate-400"></i>
              <span x-text="formatDate(wo.start)"></span>
              <template x-if="wo.end">
                <span x-text="'- ' + formatTime(wo.end)"></span>
              </template>
            </div>
          </template>
        </div>
      </div>
    </div>
  </template>

  <!-- Empty State -->
  <div x-show="filteredTasks.length === 0" class="flex flex-col items-center justify-center py-12 text-center">
    <div class="w-16 h-16 bg-slate-50 rounded-full flex items-center justify-center text-3xl mb-3 shadow-inner">
      📂
    </div>
    <p class="text-slate-500 font-medium text-sm">{% tenant_trans "No work orders found" %}</p>
    <p class="text-slate-400 text-xs mt-1"
      x-text="search ? 'Try adjusting your search' : 'Create a new order to get started'"></p>
  </div>
</div>

<script>
  (function registerPlannerList() {
    const register = () => Alpine.data('plannerList', () => ({
      tasks: [],
      machines: [],
      search: '',

      init() {
        this.refreshData();
        // Listen for global render hook
        window.addEventListener('planner-refresh-list', () => {
          console.log("List View: Refreshing Data...");
          this.refreshData();
        });

        // Connect to global search if possible
        const searchInput = document.getElementById('globalSmartSearch') || document.getElementById('timelineSearch');
        if (searchInput) {
          this.search = searchInput.value;
          searchInput.addEventListener('input', (e) => {
            this.search = e.target.value;
          });
        }
      },

      refreshData() {
        try {
          const intakeEl = document.getElementById('data-intake-orders');
          const tasksEl = document.getElementById('data-tasks');
          const machinesEl = document.getElementById('data-machines');
          if (intakeEl) {
            this.tasks = JSON.parse(intakeEl.textContent);
          } else if (tasksEl) {
            this.tasks = JSON.parse(tasksEl.textContent);
          }
          if (machinesEl) this.machines = JSON.parse(machinesEl.textContent);

          // Update search term if it changed externally
          const searchInput = document.getElementById('globalSmartSearch') || document.getElementById('timelineSearch');
          if (searchInput) this.search = searchInput.value;

        } catch (e) {
          console.error("Planner List Data Error", e);
        }
      },

      get filteredTasks() {
        if (!this.search) return this.tasks;
        const lower = this.search.toLowerCase();
        return this.tasks.filter(t =>
          (t.product && t.product.toLowerCase().includes(lower)) ||
          (t.id && String(t.id).includes(lower)) ||
          (t.assigned_worker_name && t.assigned_worker_name.toLowerCase().includes(lower))
        );
      },

      getMachineName(id) {
        const m = this.machines.find(x => x.id == id);
        return m ? m.name : 'Unknown';
      },

      formatStatus(status) {
        if (!status) return 'Pending';
        return status.replace('_', ' ');
      },

      formatCycleState(cycleState) {
        if (!cycleState) return '';
        return cycleState.next_action || cycleState.label || '';
      },

      cycleBlockerReason(cycleState) {
        if (!cycleState || !cycleState.blocked) return '';
        return cycleState.blocker_reason || '';
      },

      formatDate(dateStr) {
        if (!dateStr) return '';
        const d = new Date(dateStr);
        return d.toLocaleDateString(undefined, { month: 'short', day: 'numeric' }) + ', ' +
          d.toLocaleTimeString(undefined, { hour: '2-digit', minute: '2-digit', hour12: false });
      },

      formatTime(dateStr) {
        if (!dateStr) return '';
        const d = new Date(dateStr);
        return d.toLocaleTimeString(undefined, { hour: '2-digit', minute: '2-digit', hour12: false });
      },

      openEditDrawer(id) {
        if (window.openEditDrawer) window.openEditDrawer(id);
        else if (window.openWorkOrderModal) window.openWorkOrderModal(id);
      },

      startNextStage(wo) {
        if (!wo || !wo.id) return;

        const sourceId = wo.release_source_id || wo.id;
        window.dispatchEvent(new CustomEvent('planner-open-schedule'));

        const openReleaseForm = () => {
          if (!window.openWorkOrderModal || !window.openReleaseModal) {
            if (window.startNextStageNow) {
              window.startNextStageNow(sourceId, Number(wo.available_release_qty || wo.quantity || 0));
              return;
            }
            alert("Release form is not available. Open Schedule tab and refresh page.");
            return;
          }

          window.openWorkOrderModal(sourceId);

          let tries = 0;
          const tryOpen = () => {
            tries += 1;
            if (
              window.currentDrawerWO &&
              String(window.currentDrawerWO.id) === String(sourceId)
            ) {
              window.openReleaseModal();
              return;
            }
            if (tries < 20) {
              setTimeout(tryOpen, 120);
              return;
            }
            if (window.startNextStageNow) {
              const qty = Number(wo.available_release_qty || wo.quantity || 0);
              if (qty > 0) {
                if (confirm(`Release all ${qty} available units to the next stage now?`)) {
                  window.startNextStageNow(sourceId, qty);
                  return;
                }
              }
            }
            alert("Could not open release form. Please open Schedule and retry.");
          };
          setTimeout(tryOpen, 180);
        };

        setTimeout(openReleaseForm, 120);
      }
    }));

    if (window.Alpine) {
      register();
    } else {
      document.addEventListener('alpine:init', register);
    }

    // Global Hook
    window.renderPlannerList = function () {
      window.dispatchEvent(new CustomEvent('planner-refresh-list'));
    };
  })();
</script>
